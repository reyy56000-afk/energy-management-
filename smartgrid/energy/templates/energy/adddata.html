{% extends 'energy/base.html' %}

{% block content %}

<div class="row justify-content-center">
    <div class="col-md-6">

        <div class="card bg-dark p-4">

            <h3 class="mb-3 text-center">⚡ Add Energy Usage</h3>

            <form method="POST">
                {% csrf_token %}

                <input 
                    type="number" 
                    step="0.1" 
                    name="usage" 
                    class="form-control mb-3"
                    placeholder="Enter energy usage (kWh)"
                    required
                >

                <button class="btn btn-success w-100 btn-custom">
                    Save Data
                </button>
            </form>

        </div>

    </div>
</div>

{% endblock %}
